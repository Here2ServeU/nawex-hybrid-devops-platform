apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nawex-prod
  namespace: argocd
spec:
  project: nawex-platform
  source:
    repoURL: https://github.com/example-org/nawex-hybrid-devops-platform.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: nawex-prod
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 20
