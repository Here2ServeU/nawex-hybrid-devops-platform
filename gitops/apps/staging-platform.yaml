apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nawex-staging
  namespace: argocd
spec:
  project: nawex-platform
  source:
    repoURL: https://github.com/example-org/nawex-hybrid-devops-platform.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: nawex-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
