# AlertManager configuration for NAWEX.
#
# Requires env expansion. Set SLACK_WEBHOOK_URL (either via the AlertManager pod env
# or a mounted secret) and feed this file to AlertManager with:
#   alertmanager --config.file=observability/alertmanager/alertmanager.yml
#
# This config uses env-expansion syntax documented at:
#   https://prometheus.io/docs/alerting/latest/configuration/#configuration-file
global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  receiver: slack-default
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: slack-critical
      continue: true
    - matchers:
        - severity="warning"
      receiver: slack-default

inhibit_rules:
  # A critical alert for a service suppresses warnings for the same service.
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [service]

receivers:
  - name: slack-default
    slack_configs:
      - channel: "#nawex-alerts"
        send_resolved: true
        title: '{{ template "nawex.slack.title" . }}'
        text: '{{ template "nawex.slack.text" . }}'

  - name: slack-critical
    slack_configs:
      - channel: "#nawex-incidents"
        send_resolved: true
        title: '{{ template "nawex.slack.title" . }}'
        text: '{{ template "nawex.slack.text" . }}'

templates:
  - observability/alertmanager/templates/slack.tmpl
