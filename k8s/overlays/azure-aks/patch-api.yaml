apiVersion: apps/v1
kind: Deployment
metadata:
  name: nawex-api
  namespace: nawex-platform
spec:
  replicas: 3
  template:
    spec:
      nodeSelector:
        nawex.io/workload-class: migrated
      containers:
        - name: nawex-api
          env:
            - name: NAWEX_ENV
              value: azure-aks
