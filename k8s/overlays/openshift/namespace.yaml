apiVersion: v1
kind: Namespace
metadata:
  name: nawex-migrated
  labels:
    # Pod Security Admission still applies on OCP 4.11+ alongside SCCs.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    nawex.io/target-cluster: openshift
  annotations:
    # OpenShift-specific: documents the workload class for console grouping and
    # allows operators to see migration provenance at a glance.
    openshift.io/description: "Migrated workloads landed from vSphere via Option 1 (containerize)."
    openshift.io/display-name: "NAWEX migrated workloads"
