apiVersion: v1
kind: Namespace
metadata:
  name: nawex-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nawex-api
  namespace: nawex-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nawex-api
  template:
    metadata:
      labels:
        app: nawex-api
    spec:
      containers:
        - name: nawex-api
          image: ghcr.io/example/nawex-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: NAWEX_ENV
              value: dev
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nawex-api
  namespace: nawex-platform
spec:
  selector:
    app: nawex-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nawex-api
  namespace: nawex-platform
spec:
  minReplicas: 2
  maxReplicas: 5
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nawex-api
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: nawex-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
