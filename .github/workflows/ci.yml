name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/nawex-api/requirements.txt
            finops-aiops/python/requirements.txt
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          pip install -r app/nawex-api/requirements.txt
          if [ -f finops-aiops/python/requirements.txt ]; then
            pip install -r finops-aiops/python/requirements.txt
          fi
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest --cov=finops-aiops/python --cov=app -q

  kustomize:
    name: Kustomize build + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
      - name: Install kubeconform
        run: |
          curl -L -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/
      - name: Build + validate overlays
        run: |
          set -euo pipefail
          for overlay in k8s/overlays/*; do
            echo "=== $overlay ==="
            kustomize build "$overlay" | kubeconform -strict -summary -schema-location default -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done

  docker:
    name: Docker build + Hadolint + Trivy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: nawex-api, context: app/nawex-api }
          - { name: nawex-worker, context: app/nawex-worker }
          - { name: nawex-web-ui, context: app/nawex-web-ui }
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.image.context }}/Dockerfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          load: true
          tags: ${{ matrix.image.name }}:ci
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image.name }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  shell:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts

  gitops:
    name: GitOps manifests exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Argo CD project + apps
        run: |
          set -euo pipefail
          test -f gitops/project.yaml
          test -f gitops/root-application.yaml
          for env in dev staging prod onprem; do
            test -f "gitops/apps/${env}-platform.yaml"
            test -f "k8s/overlays/${env}/kustomization.yaml"
          done
