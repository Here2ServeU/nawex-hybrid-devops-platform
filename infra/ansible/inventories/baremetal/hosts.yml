# Ansible inventory for NAWEX bare-metal hosts that run OpenShift.
#
# Grouping strategy:
#   - `baremetal_nodes`   — every physical host in the fleet (target of the
#                           Linux baseline and day-2 role playbooks).
#   - `openshift_masters` / `openshift_workers` — cluster role.
#   - `dell_poweredge` / `hpe_proliant` / `cisco_ucs` — vendor-specific
#                           groups. Used by the firmware-baseline playbook
#                           to pick the correct BMC driver (racadm / iLOREST
#                           / Cisco IMC XML API).
#
# Every host records `bmc_address` so operational playbooks (power cycle,
# firmware check, TPM attestation) can act on the BMC instead of SSH'ing
# into the OS.

all:
  children:
    linux_nodes:
      children:
        baremetal_nodes:

    baremetal_nodes:
      children:
        openshift_masters:
        openshift_workers:
      vars:
        ansible_user: core
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

    # -------------------------------------------------------------------
    # Cluster-role groups
    # -------------------------------------------------------------------
    openshift_masters:
      hosts:
        nawex-bm-master-0:
          ansible_host: 192.168.70.11
          bmc_address: 10.0.0.11
          vendor: dell
        nawex-bm-master-1:
          ansible_host: 192.168.70.12
          bmc_address: 10.0.0.12
          vendor: hpe
        nawex-bm-master-2:
          ansible_host: 192.168.70.13
          bmc_address: 10.0.0.13
          vendor: cisco

    openshift_workers:
      hosts:
        nawex-bm-worker-0:
          ansible_host: 192.168.70.21
          bmc_address: 10.0.0.21
          vendor: dell
        nawex-bm-worker-1:
          ansible_host: 192.168.70.22
          bmc_address: 10.0.0.22
          vendor: hpe
        nawex-bm-worker-2:
          ansible_host: 192.168.70.23
          bmc_address: 10.0.0.23
          vendor: cisco

    # -------------------------------------------------------------------
    # Vendor groups — select the correct BMC driver per host
    # -------------------------------------------------------------------
    dell_poweredge:
      hosts:
        nawex-bm-master-0:
        nawex-bm-worker-0:
      vars:
        bmc_driver: idrac        # iDRAC 9, Redfish + racadm
        redfish_system_id: System.Embedded.1

    hpe_proliant:
      hosts:
        nawex-bm-master-1:
        nawex-bm-worker-1:
      vars:
        bmc_driver: ilo5         # HPE iLO 5, Redfish + iLOREST
        redfish_system_id: "1"

    cisco_ucs:
      hosts:
        nawex-bm-master-2:
        nawex-bm-worker-2:
      vars:
        bmc_driver: cimc         # Cisco UCS CIMC (standalone C-series)
        redfish_system_id: "1"
