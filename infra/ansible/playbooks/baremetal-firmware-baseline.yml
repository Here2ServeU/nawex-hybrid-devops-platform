---
# Pre-install BMC and firmware baseline for NAWEX bare-metal hosts.
#
# Firmware drift across a mixed Cisco/HPE/Dell fleet is the most common
# cause of OpenShift baremetal install failures — a stale iDRAC, iLO, or
# CIMC will not expose the Redfish endpoints the installer expects. Run
# this BEFORE `openshift-install create cluster` to confirm every BMC is
# reachable, at an acceptable firmware level, and advertising virtual
# media.
#
# The role runs against the BMC endpoint (delegated to localhost), not
# the OS — hosts may not even be powered on yet.

- name: Validate BMC baseline on all bare-metal OpenShift nodes
  hosts: baremetal_nodes
  gather_facts: false
  connection: local
  roles:
    - baremetal-bmc
