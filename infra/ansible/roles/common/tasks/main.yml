---
- name: Ensure baseline packages are installed
  ansible.builtin.package:
    name:
      - curl
      - git
      - vim
      - rsyslog
    state: present

- name: Ensure mission platform admin group exists
  ansible.builtin.group:
    name: nawex-admins
    state: present

- name: Disable root ssh login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
  notify: restart ssh

- name: Install platform maintenance cron
  ansible.builtin.cron:
    name: "nawex log cleanup"
    minute: "15"
    hour: "2"
    user: root
    job: "/usr/bin/find /var/log -type f -name '*.log' -mtime +14 -delete"
