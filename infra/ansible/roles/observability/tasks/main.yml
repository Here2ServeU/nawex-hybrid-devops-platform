---
- name: Ensure node_exporter system user exists
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/node_exporter
    create_home: false

- name: Fetch node_exporter release
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: '0644'

- name: Install node_exporter binary
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: '0755'
    extra_opts:
      - --strip-components=1
      - --wildcards
      - '*/node_exporter'

- name: Install node_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Prometheus node_exporter
      After=network.target

      [Service]
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter --web.listen-address={{ node_exporter_listen }}
      Restart=on-failure
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true

      [Install]
      WantedBy=multi-user.target
  notify:
    - reload systemd
    - restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.service:
    name: node_exporter
    enabled: true
    state: started
