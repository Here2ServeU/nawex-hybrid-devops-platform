# NAWEX Linux Baseline — auditd rules
# Aligned with CIS 4.1.* controls. Delivered by the `security` Ansible role
# or by scripts/harden.sh. Load with `augenrules --load`.
#
# The `-e 2` line at the end makes the configuration immutable; a reboot is
# required to change it. This is intentional — tampering with audit while
# an incident is in flight is the one thing we refuse to allow.

# ───── Date / time tampering ─────
-a always,exit -F arch=b64 -S adjtimex,settimeofday,clock_settime -k time-change
-a always,exit -F arch=b32 -S adjtimex,settimeofday,clock_settime -k time-change
-w /etc/localtime -p wa -k time-change

# ───── User / group changes ─────
-w /etc/group       -p wa -k identity
-w /etc/passwd      -p wa -k identity
-w /etc/shadow      -p wa -k identity
-w /etc/gshadow     -p wa -k identity
-w /etc/sudoers     -p wa -k identity
-w /etc/sudoers.d/  -p wa -k identity

# ───── Network environment ─────
-w /etc/hosts              -p wa -k system-locale
-w /etc/sysconfig/network  -p wa -k system-locale
-w /etc/netplan/           -p wa -k system-locale

# ───── MAC policy (SELinux / AppArmor) ─────
-w /etc/selinux/   -p wa -k MAC-policy
-w /etc/apparmor/  -p wa -k MAC-policy
-w /etc/apparmor.d/ -p wa -k MAC-policy

# ───── Login / logout / sessions ─────
-w /var/log/lastlog       -p wa -k logins
-w /var/run/faillock/     -p wa -k logins
-w /var/run/utmp          -p wa -k session
-w /var/log/wtmp          -p wa -k session
-w /var/log/btmp          -p wa -k session

# ───── DAC permission modifications ─────
-a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=unset -k perm_mod
-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_mod
-a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod

# ───── Unsuccessful file access ─────
-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access
-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EPERM  -F auid>=1000 -F auid!=unset -k access

# ───── Privileged command use ─────
-a always,exit -F path=/usr/bin/sudo   -F perm=x -F auid>=1000 -F auid!=unset -k privileged
-a always,exit -F path=/usr/bin/passwd -F perm=x -F auid>=1000 -F auid!=unset -k privileged
-a always,exit -F path=/usr/bin/su     -F perm=x -F auid>=1000 -F auid!=unset -k privileged

# ───── Mount operations ─────
-a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k mounts

# ───── Kernel module loading ─────
-w /sbin/insmod   -p x -k modules
-w /sbin/rmmod    -p x -k modules
-w /sbin/modprobe -p x -k modules
-a always,exit -F arch=b64 -S init_module,delete_module -k modules

# ───── Make the configuration immutable (must remain last) ─────
-e 2
